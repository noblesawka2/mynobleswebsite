<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/asset/ChatGPT Image Jul 16, 2026, 04_19_37 PM.png">
  <title>Admin — Nobles Cooperative</title>
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./asset/css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
 <!-- ===== admin.html (protected) ===== -->
<!-- ... same header/footer ... -->

<main id="main" class="section-pad" style="padding-top:140px;">
  <div class="container">
    <div class="section-head reveal">
      <h2>Admin Panel</h2>
      <p>Manage gallery items.</p>
    </div>

    <!-- Login Form -->
    <div id="loginForm" style="max-width:400px; margin:0 auto; background:var(--white); padding:30px; border-radius:var(--r-md); box-shadow:var(--shadow-md); border:1px solid var(--line);">
      <h3 style="font-family:var(--font-display); color:var(--purple); margin-bottom:20px;">Admin Login</h3>
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="admin@example.com" />
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <button id="loginBtn" class="btn btn-primary btn-block">Sign In</button>
      <p id="loginMessage" style="margin-top:12px; color:var(--orange-deep); font-size:.9rem;"></p>
    </div>

    <!-- Admin Panel (hidden until logged in) -->
    <div id="adminPanel" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
        <h3 style="font-family:var(--font-display); color:var(--purple);">Add New Item</h3>
        <button id="logoutBtn" class="btn btn-outline btn-sm">Logout</button>
      </div>

      <form id="uploadForm" style="background:var(--white); padding:30px; border-radius:var(--r-md); border:1px solid var(--line); margin-bottom:40px;">
        <div class="calc-form-grid">
          <div class="form-group">
            <label for="itemTitle">Title *</label>
            <input type="text" id="itemTitle" required />
          </div>
          <div class="form-group">
            <label for="itemDesc">Description</label>
            <input type="text" id="itemDesc" />
          </div>
        </div>
        <div class="form-group" style="margin-bottom:20px;">
          <label for="itemFile">Choose image or video *</label>
          <input type="file" id="itemFile" accept="image/*,video/*" required />
        </div>
        <button type="submit" class="btn btn-primary">➕ Add to Gallery</button>
        <span id="uploadStatus" style="margin-left:16px; font-size:.9rem; color:var(--muted);"></span>
      </form>

      <h3 style="font-family:var(--font-display); color:var(--purple); margin-bottom:20px;">Existing Items</h3>
      <div id="adminGrid" class="gallery-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:24px;"></div>
    </div>
  </div>
</main>

<!-- Lightbox -->
<div id="lightbox" style="display:none; position:fixed; inset:0; z-index:2000; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; backdrop-filter:blur(6px);">
  <div style="position:relative; max-width:90vw; max-height:90vh;">
    <button id="lightboxClose" style="position:absolute; top:-50px; right:0; background:none; border:none; color:white; font-size:2rem; cursor:pointer;">&times;</button>
    <div id="lightboxContent" style="display:flex; justify-content:center; align-items:center; width:100%; height:100%;"></div>
  </div>
</div>

<script src="asset/js/app.js"></script>
<script>
  (async function() {
    "use strict";

    const loginForm = document.getElementById('loginForm');
    const adminPanel = document.getElementById('adminPanel');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const loginMsg = document.getElementById('loginMessage');
    const logoutBtn = document.getElementById('logoutBtn');
    const uploadForm = document.getElementById('uploadForm');
    const uploadStatus = document.getElementById('uploadStatus');
    const adminGrid = document.getElementById('adminGrid');

    // ---- Check auth state ----
    async function checkAuth() {
      const { data: { session }, error } = await supabaseClient.auth.getSession();
      if (session) {
        loginForm.style.display = 'none';
        adminPanel.style.display = 'block';
        await loadAdminItems();
      } else {
        loginForm.style.display = 'block';
        adminPanel.style.display = 'none';
      }
    }

    // ---- Login ----
    loginBtn.addEventListener('click', async function() {
      const email = loginEmail.value.trim();
      const password = loginPassword.value.trim();
      if (!email || !password) {
        loginMsg.textContent = 'Please enter email and password.';
        return;
      }
      loginMsg.textContent = 'Signing in...';
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        loginMsg.textContent = 'Error: ' + error.message;
      } else {
        loginMsg.textContent = 'Success!';
        await checkAuth();
      }
    });

    // ---- Logout ----
    logoutBtn.addEventListener('click', async function() {
      await supabaseClient.auth.signOut();
      await checkAuth();
    });

    // ---- Load items for admin ----
    async function loadAdminItems() {
      try {
        const items = await loadGalleryItems();
        renderGalleryGrid(items, 'adminGrid', true, deleteItem);
      } catch (err) {
        adminGrid.innerHTML = `<p style="color:red;">Error loading items.</p>`;
        console.error(err);
      }
    }

    // ---- Delete item ----
    async function deleteItem(id) {
      // 1. Get file URL
      const { data: item, error: fetchError } = await supabaseClient
        .from('gallery_items')
        .select('file_url')
        .eq('id', id)
        .single();
      if (fetchError || !item) {
        alert('Could not find item.');
        return;
      }
      const filePath = item.file_url.split('/').pop();

      // 2. Delete from Storage
      const { error: storageError } = await supabaseClient.storage
        .from('gallery')
        .remove([filePath]);
      if (storageError) console.warn('Storage delete failed:', storageError);

      // 3. Delete from database
      const { error: dbError } = await supabaseClient
        .from('gallery_items')
        .delete()
        .eq('id', id);
      if (dbError) {
        alert('Delete failed: ' + dbError.message);
        return;
      }
      alert('Item deleted.');
      await loadAdminItems();
    }

    // ---- Upload ----
    uploadForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    const title = document.getElementById('itemTitle').value.trim();
    const desc = document.getElementById('itemDesc').value.trim();
    const fileInput = document.getElementById('itemFile');
    const file = fileInput.files[0];

    if (!title || !file) {
      uploadStatus.textContent = '⚠️ Please fill title and select a file.';
      uploadStatus.style.color = 'var(--orange-deep)';
      return;
    }

    // ---- File size validation (Supabase free tier: 50MB limit) ----
    const MAX_FILE_SIZE_MB = 50;
    const fileSizeMB = file.size / (1024 * 1024);
    if (fileSizeMB > MAX_FILE_SIZE_MB) {
      uploadStatus.textContent = `❌ File too large (${fileSizeMB.toFixed(1)}MB). Max ${MAX_FILE_SIZE_MB}MB.`;
      uploadStatus.style.color = 'red';
      return;
    }

    // ---- Show upload progress ----
    uploadStatus.textContent = `⏳ Uploading (${fileSizeMB.toFixed(1)}MB)...`;
    uploadStatus.style.color = 'var(--muted)';

    // ---- Determine file type ----
    const fileType = file.type.startsWith('image/') ? 'image' : 'video';
    const fileExt = file.name.split('.').pop();
    const filePath = `${Date.now()}_${Math.random().toString(36).substring(2, 8)}.${fileExt}`;

    try {
      // ---- 1. Upload to Supabase Storage ----
      const { data: uploadData, error: uploadError } = await supabaseClient.storage
        .from('gallery')
        .upload(filePath, file, {
          cacheControl: '3600',
          upsert: false
        });

      if (uploadError) {
        uploadStatus.textContent = `❌ Upload failed: ${uploadError.message}`;
        uploadStatus.style.color = 'red';
        console.error('Upload error:', uploadError);
        return;
      }

      // ---- 2. Get public URL ----
      const { data: urlData } = supabaseClient.storage
        .from('gallery')
        .getPublicUrl(filePath);
      const publicUrl = urlData.publicUrl;

      // ---- 3. Save metadata to database ----
      const { error: dbError } = await supabaseClient
        .from('gallery_items')
        .insert([{
          title,
          description: desc,
          file_url: publicUrl,
          file_type: fileType
        }]);

      if (dbError) {
        uploadStatus.textContent = `❌ Database error: ${dbError.message}`;
        uploadStatus.style.color = 'red';
        console.error('DB error:', dbError);
        return;
      }

      // ---- Success ----
      uploadStatus.textContent = `✅ Uploaded successfully! (${fileSizeMB.toFixed(1)}MB)`;
      uploadStatus.style.color = 'var(--green-wa)';
      uploadForm.reset();
      await loadAdminItems();

    } catch (err) {
      uploadStatus.textContent = `❌ Unexpected error: ${err.message}`;
      uploadStatus.style.color = 'red';
      console.error('Upload exception:', err);
    }
  });

    // ---- Auth state listener ----
    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN') checkAuth();
      else if (event === 'SIGNED_OUT') checkAuth();
    });

    // ---- Initial check ----
    await checkAuth();
  })();
</script>
</body>
</html>
