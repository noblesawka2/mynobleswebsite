<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Path | Nobles</title>
    <style>
        /* --- BRAND THEME INTEGRATION --- */
        :root {
            --purple: #5C008C;
            --orange: #F49C00;
            --black: #0D0D14;
            --cream: #FFF7E9;
            --white: #FFFFFF;
            --font-main: 'Aeonik', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
        }

        body {
            background-color: var(--cream);
            color: var(--black);
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .section-header h2 {
            font-size: 2.2rem;
            color: var(--purple);
            margin-bottom: 10px;
        }

        .section-header p {
            color: #555;
            font-size: 1.1rem;
        }

        /* --- INTERACTIVE SELECTOR LAYOUT --- */
        .selector-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 900px) {
            .selector-grid {
                grid-template-columns: 350px 1fr;
            }
        }

        /* --- PERSONA BUTTONS / CHIPS --- */
        .persona-menu {
            display: flex;
            flex-direction: row;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 15px;
            scrollbar-width: thin;
        }

        /* Webkit scrollbar styles for clean horizontal scrolling on mobile */
        .persona-menu::-webkit-scrollbar {
            height: 6px;
        }
        .persona-menu::-webkit-scrollbar-thumb {
            background-color: var(--purple);
            border-radius: 10px;
        }

        @media (min-width: 900px) {
            .persona-menu {
                flex-direction: column;
                overflow-x: visible;
                padding-bottom: 0;
            }
        }

        .persona-btn {
            background: var(--white);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            min-width: 180px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        @media (min-width: 900px) {
            .persona-btn {
                white-space: normal;
                min-width: auto;
            }
        }

        .persona-btn:hover {
            border-color: var(--orange);
            transform: translateY(-2px);
        }

        .persona-btn.active {
            background-color: var(--purple);
            color: var(--white);
            border-color: var(--purple);
        }

        .persona-btn h4 {
            font-size: 1.05rem;
            margin-bottom: 4px;
        }

        .persona-btn p {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        /* --- DYNAMIC CONTENT DISPLAY --- */
        .pathway-display {
            background: var(--white);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(13, 13, 20, 0.05);
            transition: opacity 0.3s ease, transform 0.3s ease;
            border: 1px solid rgba(92, 0, 140, 0.1);
        }

        .fade-out {
            opacity: 0;
            transform: translateY(10px);
        }

        .validation-banner {
            background-color: var(--cream);
            border-left: 4px solid var(--orange);
            padding: 15px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .validation-banner em {
            color: var(--purple);
            font-style: normal;
            font-weight: 700;
        }

        /* --- PRODUCT PATHWAY CARDS --- */
        .product-strip {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        @media (min-width: 600px) {
            .product-strip {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .prod-card {
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s ease;
            position: relative;
        }

        .prod-card:hover {
            border-color: var(--purple);
            box-shadow: 0 5px 15px rgba(92, 0, 140, 0.05);
        }

        .prod-tag {
            background-color: var(--cream);
            color: var(--purple);
            font-size: 0.75rem;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .prod-card h5 {
            font-size: 1.1rem;
            color: var(--purple);
            margin-bottom: 8px;
        }

        .prod-card p {
            font-size: 0.9rem;
            color: #555;
            line-height: 1.4;
        }

        /* --- STEPS TO BEGIN --- */
        .conversion-flow {
            border-top: 1px solid #eee;
            padding-top: 25px;
        }

        .conversion-flow h4 {
            color: var(--purple);
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .steps {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        @media (min-width: 600px) {
            .steps {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .step {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .step-num {
            background: var(--purple);
            color: var(--white);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .step-text h6 {
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .step-text p {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 0;
        }

        /* --- CALLS TO ACTION --- */
        .cta-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        @media (min-width: 480px) {
            .cta-group {
                flex-direction: row;
            }
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }

        .btn-vault {
            background-color: var(--orange);
            color: var(--black);
        }

        .btn-vault:hover {
            background-color: #e08c00;
        }

        .btn-support {
            background-color: transparent;
            color: var(--purple);
            border: 1px solid var(--purple);
        }

        .btn-support:hover {
            background-color: rgba(92, 0, 140, 0.05);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="section-header">
        <h2>Your Journey Begins Where You Are</h2>
        <p>No generic lists. Select your category below to unlock your custom financial gateway.</p>
    </div>

    <div class="selector-grid">
        <div class="persona-menu" id="personaMenu">
            </div>

        <div class="pathway-display" id="pathwayDisplay">
            </div>
    </div>
</div>

<script>
    // --- PERSONA DATA BASE ---
    const personas = {
        petty_trader: {
            title: "Market Trader",
            subtitle: "Awka daily cashflow",
            validation: "We know daily sales are fast, but household needs keep eating up your capital. Let’s create a space to separate your business restock from your daily spending—with total dignity.",
            products: [
                { tag: "Daily Savings", title: "EasySave", desc: "Save tiny fractions of your daily sales instantly. No ledger cards, no missing funds." },
                { tag: "Capital Boost", title: "MarketLift", desc: "Access small, micro-business cash boosts to restock without taking on high-risk loans." }
            ],
            step2: "Enable EasySave in the Vault",
            step3: "Get help setting up at our Awka office"
        },
        shop_owner: {
            title: "Established Business",
            subtitle: "Weekly turnover & stock",
            validation: "You have a physical shop and visible turnover, but buying bulk stock requires big cash. We provide high-volume plans and premium support to scale your capacity.",
            products: [
                { tag: "Bulk Capital", title: "MarketPower", desc: "Unlock larger working capital reserves tailored precisely to your average monthly business turnover." },
                { tag: "Wealth Preservation", title: "Gold Vault", desc: "Lock away extra profits securely. Protect your money against inflation in our capital-safe vault." }
            ],
            step2: "Link your store turnover records",
            step3: "Book a strategy call with GrowthDesk"
        },
        salary_earner: {
            title: "Salary Earner",
            subtitle: "Newly employed professional",
            validation: "You have regular income now, but landlord pressure, emergency demands, and future goals are pulling you in ten different directions. Let’s automate your peace of mind.",
            products: [
                { tag: "Automated Safety", title: "Future Fund", desc: "Set up direct salary-day splits. Automate your emergency reserve before you can spend it." },
                { tag: "Investment Lock", title: "Gold Vault", desc: "Earn highly competitive, stable growth on mid-to-long term savings." }
            ],
            step2: "Set up auto-save on salary day",
            step3: "Run your numbers on our calculators"
        },
        university_woman: {
            title: "University Woman",
            subtitle: "UNIZIK student or grad",
            validation: "Building financial discipline now is your superpower. Learn to save your first ₦100,000, build confidence, and take control of your financial voice without stress.",
            products: [
                { tag: "Habit Builder", title: "Savings Challenge", desc: "Join thousands of peers in hitting regular micro-savings goals. Turn small cash into solid wealth." },
                { tag: "Next-Gen Tools", title: "First ₦100,000 Planner", desc: "Step-by-step digital roadmap to structure your first major financial cushion." }
            ],
            step2: "Join the NextGen savings group",
            step3: "Connect with on-campus peer leads"
        },
        wife_mother: {
            title: "Wife & Mother",
            subtitle: "Family organizer & business",
            validation: "School fees, kitchen inflation, and emergency medical bills fall on your shoulders. Let’s organize your home’s finances so you never have to scramble.",
            products: [
                { tag: "Education Lock", title: "EduSave", desc: "Targeted, locked savings strictly for school fees. Pay directly to the school with zero stress." },
                { tag: "Kitchen Defense", title: "Food Vault Super Mum", desc: "Lock down food prices. Save systematically for bulk kitchen stock runs." }
            ],
            step2: "Create an EduSave target",
            step3: "Get physical food delivery updates"
        },
        supporter_odogwu: {
            title: "The Provider / Odogwu",
            subtitle: "Family & community pillar",
            validation: "Providing for family, elderly parents, and dependents is a duty of honor. But sending cash directly often gets diverted. We help you support them with structure and accountability.",
            products: [
                { tag: "Direct Sponsorship", title: "EduSave Sponsorship", desc: "Fund educational fees directly to schools for relatives back home. Transparent tracking." },
                { tag: "Direct Sustenance", title: "Food Vault Gifting", desc: "Pre-fund direct-to-home bulk food supplies for your wife, mother, or siblings." }
            ],
            step2: "Add your family member’s plan",
            step3: "Track family deliveries via the app"
        },
        diaspora_supporter: {
            title: "Diaspora Supporter",
            subtitle: "Sending funds back home",
            validation: "We understand the frustration of sending hard-earned money home only to find it was spent on non-essentials. Direct your love through accountable, monitored channels.",
            products: [
                { tag: "Direct Food Supplies", title: "Food Vault Abroad", desc: "Fund bulk grain and kitchen supplies directly to homes in the South-East with verified delivery." },
                { tag: "Direct Fees", title: "EduSave Monitored", desc: "Ensure every kobo meant for school fees lands directly on the school's balance sheet." }
            ],
            step2: "Select family destination plans",
            step3: "Get transparent delivery receipts"
        },
        development_partner: {
            title: "Development Partner",
            subtitle: "Local implementation & impact",
            validation: "Awka and the wider South-East need robust, measurable local interventions. Partner with an institution that holds impeccable governance, transparent safeguards, and audited data.",
            products: [
                { tag: "Impact Metrics", title: "Impact Center", desc: "Review vetted community development projects focused on women's financial independence." },
                { tag: "Audited Action", title: "Partner Desk", desc: "Secure operational channels for local program deployment with clear data tracking." }
            ],
            step2: "Review our Governance Policies",
            step3: "Schedule a formal partner meeting"
        }
    };

    const menuContainer = document.getElementById('personaMenu');
    const displayContainer = document.getElementById('pathwayDisplay');

    // --- RENDER SIDEBAR TABS ---
    function renderMenu() {
        menuContainer.innerHTML = '';
        Object.keys(personas).forEach((key, index) => {
            const p = personas[key];
            const btn = document.createElement('button');
            btn.className = `persona-btn ${index === 0 ? 'active' : ''}`;
            btn.setAttribute('data-key', key);
            btn.innerHTML = `
                <h4>${p.title}</h4>
                <p>${p.subtitle}</p>
            `;
            btn.addEventListener('click', () => selectPersona(key, btn));
            menuContainer.appendChild(btn);
        });
    }

    // --- SWAP CONTENT WITH ANIMATION ---
    function selectPersona(key, selectedBtn) {
        // Toggle active button styles
        document.querySelectorAll('.persona-btn').forEach(btn => btn.classList.remove('active'));
        selectedBtn.classList.add('active');

        // Apply quick fade-out animation before updating text
        displayContainer.classList.add('fade-out');

        setTimeout(() => {
            const p = personas[key];
            
            // Build Product HTML
            let productCardsHtml = '';
            p.products.forEach(prod => {
                productCardsHtml += `
                    <div class="prod-card">
                        <span class="prod-tag">${prod.tag}</span>
                        <h5>${prod.title}</h5>
                        <p>${prod.desc}</p>
                    </div>
                `;
            });

            // Update Dynamic Content
            displayContainer.innerHTML = `
                <div class="validation-banner">
                    <em>Hello, ${p.title}:</em> "${p.validation}"
                </div>

                <div class="product-strip">
                    ${productCardsHtml}
                </div>

                <div class="conversion-flow">
                    <h4>Your 3-Step Empowerment Journey</h4>
                    <div class="steps">
                        <div class="step">
                            <span class="step-num">1</span>
                            <div class="step-text">
                                <h6>Download Nobles Vault</h6>
                                <p>Get our ultra-secure app on iOS or Google Play Store.</p>
                            </div>
                        </div>
                        <div class="step">
                            <span class="step-num">2</span>
                            <div class="step-text">
                                <h6>${p.step2}</h6>
                                <p>Begin your custom savings route seamlessly.</p>
                            </div>
                        </div>
                        <div class="step">
                            <span class="step-num">3</span>
                            <div class="step-text">
                                <h6>${p.step3}</h6>
                                <p>We're physically on hand. Never feel left alone.</p>
                            </div>
                        </div>
                    </div>

                    <div class="cta-group">
                        <a href="#" class="btn btn-vault">Download Nobles Vault App</a>
                        <a href="https://wa.me/234..." target="_blank" class="btn btn-support">Chat with human support</a>
                    </div>
                </div>
            `;

            // Fade back in smoothly
            displayContainer.classList.remove('fade-out');
        }, 300);
    }

    // Initialize Layout
    renderMenu();
    // Pre-load first persona
    selectPersona(Object.keys(personas)[0], menuContainer.firstChild);
</script>

</body>
</html>
